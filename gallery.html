<!DOCTYPE html>

<title>Solapur Gallery</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;

}

header{
background:#ff5722;
color:white;
padding:20px;
text-align:center;
}

nav{
margin-top:10px;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
text-decoration:underline;
}

section{
padding:40px;
max-width:1200px;
margin:auto;
}

h2{
text-align:center;
margin-bottom:30px;
color:#ff5722;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

}

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
transition:transform 0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

footer{
background:#333;
color:white;
text-align:center;
padding:15px;
margin-top:40px;
}

</style>

</head>
